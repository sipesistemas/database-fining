name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l ./cmd ./internal)
          if [ -n "$unformatted" ]; then
            echo "Arquivos não formatados:"; echo "$unformatted"
            echo "Rode: gofmt -w ./cmd ./internal"
            exit 1
          fi

      - name: Verify go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o bin/chfining ./cmd/chfining

      - name: Smoke test
        run: |
          # Sem servidor: deve falhar com erro de conexão e código 1.
          code=0
          ./bin/chfining -addr 127.0.0.1:1 -timeout 3s || code=$?
          if [ "$code" -ne 1 ]; then
            echo "esperava código 1 para falha de conexão, veio $code"; exit 1
          fi
          echo "smoke ok"

  release-binaries:
    name: Build binaries
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o dist/chfining-linux-amd64 ./cmd/chfining

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chfining-linux-amd64
          path: dist/*
          retention-days: 14
